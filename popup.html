<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag to Copy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      padding: 20px;
      border-radius: 12px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    .toggle-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #555;
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .status-text {
      font-size: 13px;
      color: #b0b0b0;
    }

    .status-active {
      color: #4CAF50;
      font-weight: 500;
    }

    .status-inactive {
      color: #888;
    }

    .hint {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.03);
      border-left: 2px solid #4CAF50;
      border-radius: 4px;
    }

    .hint strong {
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Drag to Copy ✂️</h1>

    <div class="toggle-section">
      <label class="switch">
        <input type="checkbox" id="toggleSwitch" checked>
        <span class="slider"></span>
      </label>
      <span class="status-text">
        <span id="statusLabel" class="status-active">Active on this tab</span>
      </span>
    </div>

    <div class="hint">
      <strong>How to use:</strong> Just drag over any text to copy it!
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
